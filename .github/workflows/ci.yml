name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Node 20 런타임의 deprecated GitHub Actions (actions/checkout@v4,
# actions/setup-java@v4, actions/upload-artifact@v4 등) 를 Node 24 로
# 강제 실행하여 매 push 마다의 deprecation 경고 노이즈를 제거한다.
# 추후 각 action 의 v5 마이그레이션이 완료되면 본 env 를 제거할 수 있다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    
    strategy:
      matrix:
        java: [ '17', '21' ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Run tests
      run: ./gradlew test
    
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results (Java ${{ matrix.java }})
        path: lib/build/test-results/**/*.xml
        reporter: java-junit
        token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-error: false
        fail-on-empty: false
    
    - name: Upload build artifacts
      if: success() && matrix.java == '17'
      uses: actions/upload-artifact@v4
      with:
        name: smart-ux-api-jar
        path: lib/build/libs/*.jar
        retention-days: 7
    
    - name: Check code style
      run: ./gradlew checkstyleMain checkstyleTest || true
    
    - name: Upload coverage to Codecov
      if: matrix.java == '17'
      uses: codecov/codecov-action@v4
      with:
        files: ./lib/build/reports/jacoco/test/jacocoTestReport.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check Markdown files
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        config: '.markdownlint.json'
        globs: |
          **/*.md
        ignores: |
          node_modules
      continue-on-error: true
    
    - name: Check for TODO/FIXME
      run: |
        if grep -r "TODO\|FIXME" --include="*.java" lib/src/main/java; then
          echo "⚠️ Warning: Found TODO/FIXME in code"
        fi
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run OWASP Dependency Check
      run: |
        chmod +x gradlew
        ./gradlew dependencyCheckAnalyze || true
    
    - name: Upload dependency check report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: lib/build/reports/dependency-check-report.html
      if: always()

